version: '3.8'

services:
  frontend:
    # 告訴 Compose 去 frontend 資料夾找 Dockerfile 來 Build
    build: ./frontend
    container_name: group11-frontend
    ports:
      - "3000:3000"

  backend:
    # 告訴 Compose 去 backend 資料夾找 Dockerfile 來 Build
    build: ./backend
    container_name: group11-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # 把本地程式碼掛載進去，方便開發
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: group11-worker
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  redis:
    image: redis:7-alpine
    container_name: group11-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped 

  db:
    image: mysql:8.4
    container_name: group11-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    env_file:
      - ./backend/.env
    environment:
      TZ: Asia/Taipei
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  

volumes:
  mysql_data:
  redis_data: