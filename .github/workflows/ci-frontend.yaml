name: ci-frontend

on:
  push:
    branches:
      - '**'
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci-frontend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --include=dev

      # add your steps here, e.g. lint, test, build etc.

      - name: Run TypeScript typecheck
        working-directory: ./frontend
        run: npm run typecheck
      
      - name: Run Frontend Tests
        working-directory: ./frontend
        run: |
          mkdir -p reports
          npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml
      
      - name: Frontend Test report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() && env.ACT != 'true' }}
        with:
          name: Vitest Results
          path: frontend/reports/vitest-**.xml
          reporter: jest-junit

      - name: Run Prettier check
        working-directory: ./frontend
        run: npm run format:check